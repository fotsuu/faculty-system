version: '3.8'

services:
  # PHP Application (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: faculty-system-app
    container_name: faculty-system-app
    restart: always
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - faculty-system-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: faculty-system-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - app
    networks:
      - faculty-system-network

  # Database (MySQL)
  db:
    image: mysql:8.0
    container_name: faculty-system-db
    restart: always
    environment:
      MYSQL_DATABASE: faculty_system
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: db_password
      MYSQL_USER: faculty_user
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "33066:3306"
    networks:
      - faculty-system-network

  # Redis (Optional but recommended for Laravel caches)
  redis:
    image: redis:alpine
    container_name: faculty-system-redis
    restart: always
    networks:
      - faculty-system-network

networks:
  faculty-system-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
